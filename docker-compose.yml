services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gurman
      POSTGRES_PASSWORD: gurman
      POSTGRES_DB: gurman
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gurman"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gurman:gurman@db:5432/gurman
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
