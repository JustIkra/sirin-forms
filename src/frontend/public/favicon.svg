<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1625"/>
      <stop offset="100%" stop-color="#2d1f3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Fork tines as bar chart (4 bars, ascending) -->
  <!-- Bar 1 (shortest) -->
  <rect x="13" y="30" width="7" height="14" rx="2" fill="url(#gold)" opacity="0.7"/>
  <!-- Bar 2 -->
  <rect x="23" y="24" width="7" height="20" rx="2" fill="url(#gold)" opacity="0.85"/>
  <!-- Bar 3 -->
  <rect x="33" y="18" width="7" height="26" rx="2" fill="url(#gold)" opacity="0.95"/>
  <!-- Bar 4 (tallest) -->
  <rect x="43" y="12" width="7" height="32" rx="2" fill="url(#gold)"/>

  <!-- Fork handle (connects all bars at bottom) -->
  <rect x="13" y="44" width="37" height="5" rx="2.5" fill="url(#accent)"/>
  <rect x="26" y="49" width="11" height="6" rx="3" fill="url(#accent)"/>

  <!-- Trend line overlay -->
  <polyline
    points="16.5,28 26.5,22 36.5,16 46.5,10"
    fill="none"
    stroke="#fbbf24"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.5"
  />

  <!-- Dot accents on trend line -->
  <circle cx="46.5" cy="10" r="2.5" fill="#fbbf24" opacity="0.8"/>
</svg>
